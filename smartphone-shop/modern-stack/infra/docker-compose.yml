services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: smartphone_shop
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      API_PORT: 4000
      DATABASE_URL: postgresql://app:app@postgres:5432/smartphone_shop
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_MAX: 180
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:4000/api/v1
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
