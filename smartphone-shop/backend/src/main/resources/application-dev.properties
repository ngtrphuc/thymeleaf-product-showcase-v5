# Development defaults to local H2 so the app can start without MySQL setup.
# To use MySQL in dev, set DATASOURCE_URL / DATASOURCE_USER / DATASOURCE_PASSWORD.
spring.datasource.url=${DATASOURCE_URL:jdbc:h2:file:./.data/smartphone_shop_dev;MODE=MySQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATASOURCE_USER:sa}
spring.datasource.password=${DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
server.error.include-stacktrace=never
server.error.include-message=never
# Dev-only bootstrap admin account (override via ADMIN_EMAIL / ADMIN_PASSWORD)
app.admin.email=${ADMIN_EMAIL:admin@smartphone.local}
app.admin.password=${ADMIN_PASSWORD:Admin@123456}
