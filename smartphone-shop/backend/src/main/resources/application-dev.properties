# Development defaults to local PostgreSQL.
# You can override with DATASOURCE_URL / DATASOURCE_USER / DATASOURCE_PASSWORD.
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartphone_shop}
spring.datasource.username=${DATASOURCE_USER:smartphone}
spring.datasource.password=${DATASOURCE_PASSWORD:smartphone}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
server.error.include-stacktrace=never
server.error.include-message=never
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=smartphone-shop
management.metrics.enable.hikaricp=true
spring.datasource.hikari.register-mbeans=true
management.tracing.sampling.probability=${APP_TRACING_SAMPLING_PROBABILITY:1.0}
# Dev-only bootstrap admin account (override via ADMIN_EMAIL / ADMIN_PASSWORD)
app.admin.email=${ADMIN_EMAIL:admin@smartphone.local}
app.admin.password=${ADMIN_PASSWORD:Admin@123456}
app.search.meili.enabled=${APP_SEARCH_MEILI_ENABLED:true}
