spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USER}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=true
spring.cache.type=redis
spring.cache.redis.time-to-live=300s
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=SmartphoneShopHikariPool
spring.jpa.properties.hibernate.default_batch_fetch_size=${HIBERNATE_DEFAULT_BATCH_FETCH_SIZE:20}
spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_JDBC_BATCH_SIZE:30}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
management.endpoints.web.exposure.include=health,info,metrics,cache,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=ping
management.endpoint.health.group.liveness.show-details=never
management.endpoint.health.group.readiness.include=db,redis
management.endpoint.health.group.readiness.show-details=when-authorized
management.metrics.tags.application=smartphone-shop
management.metrics.enable.hikaricp=true
spring.datasource.hikari.register-mbeans=true
management.tracing.sampling.probability=${APP_TRACING_SAMPLING_PROBABILITY:0.2}
server.error.include-stacktrace=never
server.error.include-message=never
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
app.jwt.cookie.secure=${APP_JWT_COOKIE_SECURE:true}
app.email.provider=${APP_EMAIL_PROVIDER:smtp}
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
