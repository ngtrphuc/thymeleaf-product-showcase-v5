spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USER}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=true
spring.cache.type=redis
spring.cache.redis.time-to-live=300s
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=SmartphoneShopHikariPool
management.endpoints.web.exposure.include=health,info,metrics,cache,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=smartphone-shop
management.metrics.enable.hikaricp=true
spring.datasource.hikari.register-mbeans=true
server.error.include-stacktrace=never
server.error.include-message=never
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
app.jwt.cookie.secure=${APP_JWT_COOKIE_SECURE:true}
