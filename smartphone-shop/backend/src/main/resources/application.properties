spring.application.name=smartphone-shop
# Use `dev` by default for local runs; override with SPRING_PROFILES_ACTIVE=prod in production.
spring.profiles.default=dev
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-migration-naming=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.jackson.serialization.write-dates-as-timestamps=false
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=false
info.app.name=Smartphone Shop
info.app.version=1.0.0
app.jwt.secret=${JWT_SECRET:change-this-secret-in-production-change-this-secret-in-production}
app.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:120}
app.jwt.cookie.secure=${APP_JWT_COOKIE_SECURE:false}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.security.login-rate-limit.max-attempts=${APP_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:8}
app.security.login-rate-limit.window-seconds=${APP_LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
app.security.login-rate-limit.max-clients=${APP_LOGIN_RATE_LIMIT_MAX_CLIENTS:50000}
app.security.trusted-proxies=${APP_TRUSTED_PROXIES:}
app.security.api-rate-limit.enabled=${APP_API_RATE_LIMIT_ENABLED:true}
app.security.api-rate-limit.max-requests=${APP_API_RATE_LIMIT_MAX_REQUESTS:180}
app.security.api-rate-limit.window-seconds=${APP_API_RATE_LIMIT_WINDOW_SECONDS:60}
app.security.api-rate-limit.max-clients=${APP_API_RATE_LIMIT_MAX_CLIENTS:200000}
app.security.api-rate-limit.excluded-paths=${APP_API_RATE_LIMIT_EXCLUDED_PATHS:/api/v1/auth/login,/api/v1/auth/register,/api/v1/auth/logout,/api/v1/auth/me}
app.search.meili.enabled=${APP_SEARCH_MEILI_ENABLED:false}
app.search.meili.sync-on-startup=${APP_SEARCH_MEILI_SYNC_ON_STARTUP:true}
app.search.meili.host=${APP_SEARCH_MEILI_HOST:http://localhost:7700}
app.search.meili.api-key=${APP_SEARCH_MEILI_API_KEY:}
app.search.meili.index-name=${APP_SEARCH_MEILI_INDEX_NAME:products}
app.search.meili.search-limit=${APP_SEARCH_MEILI_SEARCH_LIMIT:120}
app.search.meili.connect-timeout-millis=${APP_SEARCH_MEILI_CONNECT_TIMEOUT_MILLIS:2000}
app.assets.base-url=${APP_ASSETS_BASE_URL:}
app.order.workflow.enabled=${APP_ORDER_WORKFLOW_ENABLED:true}
spring.data.redis.repositories.enabled=false
