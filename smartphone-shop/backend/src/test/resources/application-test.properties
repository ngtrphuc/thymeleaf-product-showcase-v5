spring.datasource.url=jdbc:h2:mem:smartphone_shop_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.flyway.enabled=false
spring.cache.type=simple
server.error.include-stacktrace=never
server.error.include-message=never
app.search.meili.enabled=false
app.security.api-rate-limit.enabled=false
app.order.workflow.enabled=false
management.tracing.enabled=false
