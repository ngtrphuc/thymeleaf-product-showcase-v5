groups:
  - name: smartphone-shop-alerts
    rules:
      - alert: SmartphoneShopBackendDown
        expr: up{job="smartphone-shop-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Backend is unreachable"
          description: "Prometheus cannot scrape smartphone-shop backend for more than 2 minutes."

      - alert: SmartphoneShopHighApiErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{job="smartphone-shop-backend", uri=~"/api/.*", status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count{job="smartphone-shop-backend", uri=~"/api/.*"}[5m])), 0.001)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High API 5xx error rate"
          description: "API 5xx ratio is above 5% for 10 minutes."

      - alert: SmartphoneShopHighApiP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(http_server_requests_seconds_bucket{job="smartphone-shop-backend", uri=~"/api/.*"}[5m])
            )
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High API p95 latency"
          description: "API p95 latency is above 1 second for 10 minutes."

      - alert: SmartphoneShopLowCatalogCacheHitRatio
        expr: |
          (
            sum(rate(cache_gets_total{job="smartphone-shop-backend", cache=~"catalogPublic|productDetailPublic"}[15m])) > 0
          )
          and
          (
            sum(rate(cache_gets_total{job="smartphone-shop-backend", cache=~"catalogPublic|productDetailPublic", result="hit"}[15m]))
            /
            sum(rate(cache_gets_total{job="smartphone-shop-backend", cache=~"catalogPublic|productDetailPublic"}[15m]))
          ) < 0.30
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Low catalog cache hit ratio"
          description: "Catalog/Product detail cache hit ratio is below 30% for 30 minutes."
