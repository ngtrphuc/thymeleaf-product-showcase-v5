name: Smartphone Shop CI

on:
  push:
    paths:
      - "smartphone-shop/**"
      - ".github/workflows/smartphone-shop-ci.yml"
  pull_request:
    paths:
      - "smartphone-shop/**"
      - ".github/workflows/smartphone-shop-ci.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartphone-shop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Backend Tests
        run: ./mvnw -B test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartphone-shop/frontend-next
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: smartphone-shop/frontend-next/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
