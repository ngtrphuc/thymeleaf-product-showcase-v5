<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Log In</title>
    <link rel="stylesheet" th:href="@{/customer/css/style.css}">
    <script defer th:src="@{/customer/js/auth-password-toggle.js}"></script>
</head>
<body class="auth-neo-page">
    <main class="auth-neo-shell">
        <nav class="auth-neo-nav">
            <a href="/" class="auth-neo-brand"><span class="icon-svg icon-spark" aria-hidden="true"></span> Smartphone Shop</a>
            <div class="auth-neo-switch">
                <a href="/login" class="auth-neo-switch__btn auth-neo-switch__btn--left is-active">
                    <span class="auth-neo-switch__label">Log In</span>
                </a>
                <a href="/register" class="auth-neo-switch__btn auth-neo-switch__btn--right">
                    <span class="auth-neo-switch__label">Sign Up</span>
                </a>
            </div>
        </nav>

        <section class="auth-neo-card">
            <h1 class="auth-neo-title">Welcome Back</h1>
            <p class="auth-neo-subtitle">Sign in to continue shopping with your account.</p>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${param.registered}" class="alert alert-success">Registration successful! Please log in.</div>

            <form method="post" th:action="@{/login}" class="auth-neo-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label class="auth-neo-label" for="login-email">Email</label>
                <input id="login-email" type="email" name="username" placeholder="info@gmail.com" required>

                <label class="auth-neo-label" for="login-password">Password</label>
                <div class="auth-neo-password-wrap">
                    <input id="login-password" type="password" name="password" placeholder="********" required>
                    <span class="auth-pass-toggle" role="button" tabindex="0"
                        aria-label="Show password" aria-controls="login-password" aria-pressed="false"
                        data-target="login-password">
                        <span class="auth-pass-toggle__when-hidden icon-svg icon-eye" aria-hidden="true"></span>
                        <span class="auth-pass-toggle__when-visible icon-svg icon-eye-off" aria-hidden="true"></span>
                    </span>
                </div>

                <button type="submit" class="auth-neo-submit auth-neo-submit--login">
                    <span>Log In</span>
                </button>
            </form>

            <p class="auth-neo-note">
                Don't have an account? <a href="/register">Create one</a>
            </p>
        </section>
    </main>
</body>
</html>
