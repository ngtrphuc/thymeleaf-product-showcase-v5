<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="header">
        <a href="/" class="home-animated"><span class="icon-svg icon-home" aria-hidden="true"></span> HOME</a>
        <div class="header-actions">
            <a sec:authorize="!isAuthenticated()" href="/login" class="btn-header header-action header-action--login">
                <span class="header-action__icon header-action__icon--login icon-svg icon-login" aria-hidden="true"></span>
                <span class="header-action__label">Log In</span>
            </a>
            <th:block sec:authorize="isAuthenticated()">
                <a sec:authorize="hasRole('USER')" href="/my-orders" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-orders" aria-hidden="true"></span>
                    <span class="header-action__label">Orders</span>
                </a>
                <a sec:authorize="hasRole('USER')" href="/wishlist" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-wishlist" aria-hidden="true"></span>
                    <span class="header-action__label">Wishlist</span>
                </a>
                <a sec:authorize="hasRole('USER')" href="/compare" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-clipboard" aria-hidden="true"></span>
                    <span class="header-action__label">Compare</span>
                </a>
                <a sec:authorize="hasRole('USER')" href="/cart" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-cart" aria-hidden="true"></span>
                    <span class="header-action__label">Cart (<span th:text="${session.cartCount != null ? session.cartCount : 0}">0</span>)</span>
                </a>
                <a sec:authorize="hasRole('USER')" th:href="@{/profile}" class="btn-header header-action header-action--profile">
                    <span class="header-action__icon icon-svg icon-user" aria-hidden="true"></span>
                    <span class="header-action__label" sec:authentication="name"></span>
                </a>
                <a sec:authorize="hasRole('ADMIN')" href="/admin" class="btn-header header-action header-action--accent">
                    <span class="header-action__icon icon-svg icon-admin" aria-hidden="true"></span>
                    <span class="header-action__label">Admin</span>
                </a>
                <form th:action="@{/logout}" method="post" style="display:inline;margin:0;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-logout-link header-action header-action--danger">
                        <span class="header-action__icon icon-svg icon-logout" aria-hidden="true"></span>
                        <span class="header-action__label">Log Out</span>
                    </button>
                </form>
            </th:block>
        </div>
    </div>

    <div class="profile-layout">
        <h2 style="margin-bottom:20px;font-family:'Syne',sans-serif;font-weight:700;"><span class="icon-svg icon-profile" aria-hidden="true"></span> My Profile</h2>

        <div class="profile-card">
            <div class="section-title">Account Information</div>
            <form th:action="@{/profile/update}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="info-grid">
                    <div class="info-group">
                        <label>Full Name</label>
                        <input type="text" name="fullName" th:value="${user.fullName}" required minlength="2">
                    </div>
                    <div class="info-group">
                        <label>Email</label>
                        <input type="email" th:value="${user.email}" disabled>
                    </div>
                    <div class="info-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phoneNumber" th:value="${user.phoneNumber}" placeholder="e.g. 08012345678">
                    </div>
                    <div class="info-group full">
                        <label>Default Shipping Address</label>
                        <input type="text" name="defaultAddress" th:value="${user.defaultAddress}" placeholder="Street, City...">
                    </div>
                </div>
                <button type="submit" class="btn-save">Save Changes</button>
            </form>
        </div>

        <div class="profile-card">
            <div class="section-title"><span class="icon-svg icon-box" aria-hidden="true"></span> Pending Orders</div>
            <div th:if="${#lists.isEmpty(pendingOrders)}" class="empty-msg">No pending orders.</div>
            <div th:each="order : ${pendingOrders}" class="order-row-profile">
                <div>
                    <strong style="font-family:'Syne',sans-serif;" th:text="${order.orderCode}"></strong>
                    <span style="color:var(--text-muted);font-size:12px;margin-left:8px;" th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy')}"></span>
                </div>
                <span class="badge" th:classappend="'badge-' + ${order.status}" th:text="${order.status}"></span>
                <span style="color:var(--accent);font-weight:700;font-family:'Syne',sans-serif;" th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' JPY'"></span>
            </div>
        </div>

        <div class="profile-card">
            <div class="section-title"><span class="icon-svg icon-check" aria-hidden="true"></span> Delivered Orders</div>
            <div th:if="${#lists.isEmpty(deliveredOrders)}" class="empty-msg">No delivered orders yet.</div>
            <div th:each="order : ${deliveredOrders}" class="order-row-profile">
                <div>
                    <strong style="font-family:'Syne',sans-serif;" th:text="${order.orderCode}"></strong>
                    <span style="color:var(--text-muted);font-size:12px;margin-left:8px;" th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy')}"></span>
                </div>
                <span class="badge badge-delivered">delivered</span>
                <span style="color:var(--accent);font-weight:700;font-family:'Syne',sans-serif;" th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' JPY'"></span>
            </div>
        </div>

        <div class="profile-card">
            <div class="section-title"><span class="icon-svg icon-cart" aria-hidden="true"></span> Items in Cart</div>
            <div th:if="${#lists.isEmpty(cartItems)}" class="empty-msg">Your cart is empty.</div>
            <div th:each="item : ${cartItems}" class="cart-row">
                <span th:text="${item.name}"></span>
                <span style="color:var(--text-muted);">&times;<span th:text="${item.quantity}"></span></span>
                <span style="color:var(--accent);font-weight:700;font-family:'Syne',sans-serif;" th:text="${#numbers.formatDecimal(item.price * item.quantity,0,'COMMA',0,'POINT')} + ' JPY'"></span>
            </div>
            <div th:if="${!#lists.isEmpty(cartItems)}" style="text-align:right;margin-top:14px;">
                <a href="/cart" class="btn-save">Go to Cart &rarr;</a>
            </div>
        </div>

        <div class="profile-card">
            <div class="section-title">Payment Methods</div>

            <div th:if="${#lists.isEmpty(paymentMethods)}" class="empty-msg">No payment methods saved yet.</div>
            <div th:each="pm : ${paymentMethods}" class="cart-row">
                <div style="display:flex;flex-direction:column;gap:2px;flex:1;">
                    <span style="font-weight:600;display:flex;align-items:center;gap:8px;">
                        <img th:if="${pm.type.name() == 'CASH_ON_DELIVERY'}" th:src="@{/images/cash-on-delivery-icon.svg}" alt="Cash on Delivery"
                            class="payment-method-icon-inline">
                        <img th:if="${pm.type.name() == 'BANK_TRANSFER'}" th:src="@{/images/bank-transfer-icon.svg}" alt="Bank Transfer"
                            class="payment-method-icon-inline">
                        <img th:if="${pm.type.name() == 'PAYPAY'}" th:src="@{/images/paypay-icon.svg}" alt="PayPay"
                            class="paypay-icon-inline">
                        <img th:if="${pm.type.name() == 'MASTERCARD'}" th:src="@{/images/mastercard-icon.svg}" alt="MasterCard"
                            class="payment-method-icon-inline">
                        <span th:text="${pm.displayName}"></span>
                    </span>
                    <span th:if="${pm.maskedDetail}" style="font-size:12px;color:var(--text-muted);" th:text="${pm.maskedDetail}"></span>
                </div>
                <span th:if="${pm.default}" class="badge badge-delivered" style="font-size:10px;">default</span>

                <form th:unless="${pm.default}"
                    th:action="@{/profile/payment-methods/{id}/set-default(id=${pm.id})}"
                    method="post" style="margin:0;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-sm" style="padding:5px 10px;font-size:11px;border-radius:8px;">Set Default</button>
                </form>

                <form th:action="@{/profile/payment-methods/{id}/remove(id=${pm.id})}"
                    method="post" style="margin:0;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-sm btn-del" style="padding:5px 10px;font-size:11px;border-radius:8px;"
                        onclick="return confirm('Remove this payment method?')">Remove</button>
                </form>
            </div>

            <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--glass-border);">
                <div style="font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;">
                    Add Payment Method
                </div>
                <form th:action="@{/profile/payment-methods/add}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="profile-payment-method-grid" style="margin-bottom:12px;">
                        <label class="option-card" style="padding:8px 10px;">
                            <input type="radio" name="type" value="CASH_ON_DELIVERY" onchange="toggleProfileBankDetail(this)">
                            <span style="display:inline-flex;align-items:center;gap:6px;">
                                <img th:src="@{/images/cash-on-delivery-icon.svg}" alt="Cash on Delivery" class="payment-method-icon-inline">
                                <span>Cash on Delivery</span>
                            </span>
                        </label>
                        <label class="option-card" style="padding:8px 10px;">
                            <input type="radio" name="type" value="BANK_TRANSFER" onchange="toggleProfileBankDetail(this)">
                            <span style="display:inline-flex;align-items:center;gap:6px;">
                                <img th:src="@{/images/bank-transfer-icon.svg}" alt="Bank Transfer" class="payment-method-icon-inline">
                                <span>Bank Transfer</span>
                            </span>
                        </label>
                        <label class="option-card" style="padding:8px 10px;">
                            <input type="radio" name="type" value="PAYPAY" onchange="toggleProfileBankDetail(this)">
                            <span style="display:inline-flex;align-items:center;gap:6px;">
                                <img th:src="@{/images/paypay-icon.svg}" alt="PayPay" class="paypay-icon-inline">
                                <span>PayPay</span>
                            </span>
                        </label>
                        <label class="option-card" style="padding:8px 10px;">
                            <input type="radio" name="type" value="MASTERCARD" onchange="toggleProfileBankDetail(this)">
                            <span style="display:inline-flex;align-items:center;gap:6px;">
                                <img th:src="@{/images/mastercard-icon.svg}" alt="MasterCard" class="payment-method-icon-inline">
                                <span>MasterCard</span>
                            </span>
                        </label>
                    </div>

                    <div id="profile-bank-detail-wrap" style="display:none;margin-bottom:10px;">
                        <div class="info-group full">
                            <label>Bank Name and Account Number</label>
                            <input type="text" name="bankDetail" maxlength="200" placeholder="e.g. Mizuho Bank - 1234567890">
                        </div>
                    </div>

                    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
                        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);">
                            <input type="checkbox" name="setAsDefault" value="true">
                            Set as default
                        </label>
                        <button type="submit" class="btn-save" style="margin-top:0;">Add Method</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="toast-container" th:if="${toast}">
        <div class="toast" th:text="${toast}"></div>
    </div>
    <script>
        setTimeout(() => { document.querySelectorAll('.toast').forEach(t => t.remove()); }, 3200);

        function toggleProfileBankDetail(radio) {
            const wrap = document.getElementById('profile-bank-detail-wrap');
            if (!wrap) return;
            const input = wrap.querySelector('input[name="bankDetail"]');
            const show = radio.value === 'BANK_TRANSFER';
            wrap.style.display = show ? 'block' : 'none';
            if (input) {
                input.required = show;
                if (!show) input.value = '';
            }
        }
    </script>

    <footer th:replace="~{fragments/footer :: customerFooter}"></footer>
    <div th:replace="~{fragments/compare-bar :: compareBar}"></div>
    <div th:replace="~{fragments/chat-widget :: chatWidget}"></div>
</body>
</html>
