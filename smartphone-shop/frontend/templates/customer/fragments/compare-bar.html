<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="compareBar">
    <div th:if="${compareCount != null and compareCount > 0}"
         id="compare-bar"
         style="position:fixed;left:0;right:0;bottom:0;z-index:8998;background:var(--surface);border-top:1px solid var(--glass-border);box-shadow:0 -8px 20px rgba(0,0,0,0.12);padding:12px 28px;">
        <div style="max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
            <div style="display:flex;align-items:center;gap:8px;">
                <span class="icon-svg icon-clipboard" aria-hidden="true"></span>
                <span style="font-family:'Syne',sans-serif;font-weight:700;">
                    Compare (<span th:text="${compareCount}">0</span>/3)
                </span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <a href="/compare" class="btn-cart" style="padding:8px 14px;font-size:13px;">View Compare</a>
                <form action="/compare/clear" method="post" style="margin:0;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-cancel" style="padding:8px 14px;font-size:13px;">Clear</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
