<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Smartphone Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script defer th:src="@{/js/order-success.js}"></script>
</head>
<body>
    <div id="success-celebration" aria-hidden="true"></div>

    <div class="header">
        <a href="/" class="home-animated"><span class="icon-svg icon-home" aria-hidden="true"></span> HOME</a>
    </div>

    <div class="success-card success-card--thankyou">
        <div class="checkmark-circle"><span class="icon-svg icon-check" aria-hidden="true"></span></div>
        <h1 style="font-family:'Syne',sans-serif;font-weight:800;margin-bottom:12px;">Thank You!</h1>
        <p class="success-message">
            Your order has been placed successfully.<br>
            We will process it and contact you shortly.
        </p>
        <a href="/" class="home-animated" style="display:inline-flex;justify-content:center;"><span class="icon-svg icon-home" aria-hidden="true"></span> HOME</a>
    </div>

    <footer th:replace="~{fragments/footer :: customerFooter}"></footer>
    <div th:replace="~{fragments/compare-bar :: compareBar}"></div>
    <div th:replace="~{fragments/chat-widget :: chatWidget}"></div>
</body>
</html>
