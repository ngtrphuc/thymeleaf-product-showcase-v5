<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>My Orders</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="header">
        <a href="/" class="home-animated"><span class="icon-svg icon-home" aria-hidden="true"></span> HOME</a>
        <div class="header-actions">
            <a sec:authorize="!isAuthenticated()" href="/login" class="btn-header header-action header-action--login">
                <span class="header-action__icon header-action__icon--login icon-svg icon-login" aria-hidden="true"></span>
                <span class="header-action__label">Log In</span>
            </a>
            <th:block sec:authorize="isAuthenticated()">
                <a sec:authorize="hasRole('USER')" href="/my-orders" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-orders" aria-hidden="true"></span>
                    <span class="header-action__label">Orders</span>
                </a>
                <a sec:authorize="hasRole('USER')" href="/wishlist" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-wishlist" aria-hidden="true"></span>
                    <span class="header-action__label">Wishlist</span>
                </a>
                <a sec:authorize="hasRole('USER')" href="/compare" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-clipboard" aria-hidden="true"></span>
                    <span class="header-action__label">Compare</span>
                </a>
                <a sec:authorize="hasRole('USER')" href="/cart" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-cart" aria-hidden="true"></span>
                    <span class="header-action__label">Cart (<span th:text="${session.cartCount != null ? session.cartCount : 0}">0</span>)</span>
                </a>
                <a sec:authorize="hasRole('USER')" th:href="@{/profile}" class="btn-header header-action header-action--profile">
                    <span class="header-action__icon icon-svg icon-user" aria-hidden="true"></span>
                    <span class="header-action__label" sec:authentication="name"></span>
                </a>
                <a sec:authorize="hasRole('ADMIN')" href="/admin" class="btn-header header-action header-action--accent">
                    <span class="header-action__icon icon-svg icon-admin" aria-hidden="true"></span>
                    <span class="header-action__label">Admin</span>
                </a>
                <form th:action="@{/logout}" method="post" style="display:inline;margin:0;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-logout-link header-action header-action--danger">
                        <span class="header-action__icon icon-svg icon-logout" aria-hidden="true"></span>
                        <span class="header-action__label">Log Out</span>
                    </button>
                </form>
            </th:block>
        </div>
    </div>

    <div class="container" style="max-width:800px;">
        <h2 style="margin-bottom:24px;font-family:'Syne',sans-serif;font-weight:700;"><span class="icon-svg icon-clipboard" aria-hidden="true"></span> My Orders</h2>

        <div th:if="${#lists.isEmpty(orders)}" style="text-align:center;padding:60px 0;color:var(--text-muted);">
            <div style="font-size:50px;opacity:0.3;margin-bottom:16px;"><span class="icon-svg icon-box" aria-hidden="true"></span></div>
            <p>You have no orders yet.</p>
            <a href="/" class="btn-checkout" style="display:inline-block;margin-top:20px;padding:12px 30px;">Buy now</a>
        </div>

        <div th:each="order : ${orders}" class="order-card">
            <div class="order-header">
                <div>
                    <strong style="font-family:'Syne',sans-serif;" th:text="${order.orderCode}"></strong>
                    <span style="color:var(--text-muted);font-size:12px;margin-left:10px;" th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                </div>
                <div style="display:flex;align-items:center;gap:10px;">
                    <span class="badge" th:classappend="'badge-' + ${order.status}" th:text="${order.status}"></span>
                    <button th:if="${order.cancelable}" type="button"
                        class="btn-cancel" th:attr="onclick='openCancelModal(' + ${order.id} + ')'">
                        Cancel
                    </button>
                </div>
            </div>

            <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px;" th:text="${order.statusSummary}"></div>
            <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">
                <span class="icon-svg icon-home" aria-hidden="true"></span> <span th:text="${order.shippingAddress}"></span>
            </div>
            <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">
                <img th:if="${order.paymentMethod == 'CASH_ON_DELIVERY'}" th:src="@{/images/cash-on-delivery-icon.svg}" alt="Cash on Delivery"
                    class="payment-method-icon-inline">
                <img th:if="${order.paymentMethod == 'BANK_TRANSFER'}" th:src="@{/images/bank-transfer-icon.svg}" alt="Bank Transfer"
                    class="payment-method-icon-inline">
                <img th:if="${order.paymentMethod == 'PAYPAY'}" th:src="@{/images/paypay-icon.svg}" alt="PayPay"
                    class="paypay-icon-inline">
                <img th:if="${order.paymentMethod == 'KOMBINI'}" th:src="@{/images/kombini-icon.svg}" alt="Kombini"
                    class="payment-method-icon-inline">
                <img th:if="${order.paymentMethod == 'MASTERCARD'}" th:src="@{/images/mastercard-icon.svg}" alt="MasterCard"
                    class="payment-method-icon-inline">
                <span th:text="${order.paymentMethodDisplayName}"></span>
                <span style="margin-left:10px;font-weight:700;" th:text="${order.paymentPlanDisplayName}">Full payment</span>
                <span th:if="${order.installment and order.installmentMonths != null and order.installmentMonthlyAmount != null}"
                    style="margin-left:6px;"
                    th:text="${'(' + order.installmentMonths + ' x ' + #numbers.formatDecimal(order.installmentMonthlyAmount, 0, 'COMMA', 0, 'POINT') + ' JPY / month)'}">
                    Installment detail
                </span>
            </div>

            <div class="order-items">
                <div th:each="item : ${order.items}" class="order-item-row">
                    <span>
                        <span th:text="${item.productName}"></span> &times; <span th:text="${item.quantity}"></span>
                    </span>
                    <span th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' JPY'" style="color:var(--accent);font-weight:700;"></span>
                </div>
            </div>

            <div style="text-align:right;margin-top:12px;font-size:15px;font-weight:700;font-family:'Syne',sans-serif;">
                <span style="display:block;color:var(--text-muted);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;margin-bottom:4px;"
                    th:text="${order.itemCount} + ' item(s)'">0 item(s)</span>
                Total: <span style="color:var(--accent);" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' JPY'"></span>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="cancelModal">
        <div class="modal-box">
            <div class="modal-icon"><span class="icon-svg icon-alert" aria-hidden="true"></span></div>
            <div class="modal-title">Cancel Order?</div>
            <div class="modal-desc">Are you sure you want to cancel this order?<br>Stock will be restored.</div>
            <div class="modal-order-id" id="modalOrderId"></div>
            <div class="modal-actions">
                <button class="btn-modal-cancel keep-order-btn" onclick="closeCancelModal()">Keep Order</button>
                <button class="btn-modal-confirm" onclick="confirmCancel()">Yes, Cancel</button>
            </div>
        </div>
    </div>

    <form id="cancelForm" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    </form>

    <div class="toast-container" th:if="${toast}">
        <div class="toast" th:text="${toast}"></div>
    </div>

    <footer th:replace="~{fragments/footer :: customerFooter}"></footer>

    <script>
        let pendingCancelId = null;

        function openCancelModal(orderId) {
            pendingCancelId = orderId;
            document.getElementById('modalOrderId').textContent = 'Order #' + orderId;
            document.getElementById('cancelModal').classList.add('active');
        }

        function closeCancelModal() {
            pendingCancelId = null;
            document.getElementById('cancelModal').classList.remove('active');
        }

        function confirmCancel() {
            if (!pendingCancelId) return;
            const form = document.getElementById('cancelForm');
            form.action = '/my-orders/' + pendingCancelId + '/cancel';
            form.submit();
        }

        document.getElementById('cancelModal').addEventListener('click', function(e) {
            if (e.target === this) closeCancelModal();
        });

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCancelModal(); });

        setTimeout(() => document.querySelectorAll('.toast').forEach(t => t.remove()), 3200);
    </script>
    <div th:replace="~{fragments/compare-bar :: compareBar}"></div>
    <div th:replace="~{fragments/chat-widget :: chatWidget}"></div>
</body>
</html>
