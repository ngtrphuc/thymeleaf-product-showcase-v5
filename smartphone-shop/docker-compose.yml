services:
  postgres:
    image: postgres:16-alpine
    container_name: smartphone-shop-postgres
    environment:
      POSTGRES_DB: smartphone_shop
      POSTGRES_USER: smartphone
      POSTGRES_PASSWORD: smartphone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartphone -d smartphone_shop"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: smartphone-shop-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
